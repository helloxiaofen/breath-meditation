<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>呼吸 · 冥想</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg1:#0a0e27;--bg2:#1a1a3e;--accent:#7ec8e3;--accent2:#a882dd;--text:#e8e8f0;--muted:#8888aa}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg1);color:var(--text);user-select:none}

/* 动态背景 */
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.bg-gradient{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:linear-gradient(135deg,#0a0e27 0%,#161b42 35%,#1e1a40 65%,#0f1133 100%)}
.bg-aurora{position:fixed;top:-20%;left:-10%;width:120%;height:80%;z-index:0;
  background:radial-gradient(ellipse at 30% 40%,rgba(126,200,227,.12),transparent 50%),
             radial-gradient(ellipse at 70% 60%,rgba(168,130,221,.1),transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(126,200,227,.06),transparent 40%);
  animation:auroraShift 12s ease-in-out infinite alternate;filter:blur(40px)}
@keyframes auroraShift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(3%,2%) scale(1.08)}}

/* 星点 */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle 4s infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.6;transform:scale(1)}}

/* 顶部状态栏 */
.topbar{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:28px 32px 0}
.stat-box{text-align:center}
.stat-num{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:2px;text-transform:uppercase}
.divider{width:1px;height:36px;background:linear-gradient(to bottom,transparent,rgba(255,255,255,.12),transparent)}

/* 声音控制 */
.sound-controls{position:fixed;top:28px;right:24px;z-index:20;display:flex;gap:8px}
.sound-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .3s ease;backdrop-filter:blur(10px)}
.sound-btn:hover{border-color:rgba(126,200,227,.4);color:var(--text)}
.sound-btn.active{background:rgba(126,200,227,.15);border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(126,200,227,.2)}

/* 音量滑块 */
.volume-wrap{position:fixed;top:72px;right:24px;z-index:20;
  background:rgba(10,14,39,.6);border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:10px 14px;backdrop-filter:blur(10px);
  opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .3s ease}
.volume-wrap.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.volume-wrap label{font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:4px}
.volume-slider{-webkit-appearance:none;width:100px;height:3px;border-radius:2px;
  background:rgba(255,255,255,.1);outline:none}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(126,200,227,.4)}

/* 中心呼吸区 */
.breath-zone{position:relative;z-index:10;height:calc(100vh - 220px);display:flex;flex-direction:column;align-items:center;justify-content:center}

.breath-circle-wrap{position:relative;width:280px;height:280px;display:flex;align-items:center;justify-content:center}

/* 外层光晕 */
.breath-glow{position:absolute;width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle,rgba(126,200,227,.18),rgba(168,130,221,.06) 60%,transparent 75%);
  filter:blur(20px);transition:all .1s linear}

/* 呼吸圆环 */
.breath-ring{position:absolute;border-radius:50%;border:2px solid rgba(126,200,227,.25);transition:all .1s linear}
.ring-1{width:100%;height:100%}
.ring-2{width:85%;height:85%;border-color:rgba(168,130,221,.18)}
.ring-3{width:70%;height:70%;border-color:rgba(126,200,227,.12)}

/* 呼吸核心圆 */
.breath-core{position:relative;border-radius:50%;
  width:140px;height:140px;
  background:linear-gradient(145deg,rgba(126,200,227,.35),rgba(168,130,221,.25));
  border:1px solid rgba(126,200,227,.3);
  display:flex;align-items:center;justify-content:center;
  transition:all .1s linear;
  box-shadow:0 0 60px rgba(126,200,227,.2),inset 0 0 30px rgba(168,130,221,.1)}

/* 核心内光 */
.breath-core::before{content:'';position:absolute;width:80%;height:80%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.15),transparent 60%);transition:all .1s linear}

/* 文字提示 */
.phase-text{position:absolute;font-size:22px;font-weight:300;letter-spacing:4px;color:var(--text);text-shadow:0 0 20px rgba(126,200,227,.4);transition:opacity .3s}

/* 计数器 */
.counter-display{position:relative;z-index:10;text-align:center;padding:0 0 24px}
.cycle-dots{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;max-width:200px}
.cycle-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .4s ease}
.cycle-dot.active{background:var(--accent);box-shadow:0 0 8px rgba(126,200,227,.5);transform:scale(1.4)}
.cycle-dot.done{background:rgba(168,130,221,.4)}
.cycle-info{font-size:12px;color:var(--muted);letter-spacing:1px}

/* 开始按钮 */
.start-btn{position:relative;z-index:10;display:block;margin:0 auto;
  padding:14px 44px;border-radius:30px;border:1px solid rgba(126,200,227,.35);
  background:rgba(126,200,227,.08);color:var(--text);font-size:15px;letter-spacing:3px;
  cursor:pointer;transition:all .3s ease;backdrop-filter:blur(10px)}
.start-btn:hover{background:rgba(126,200,227,.18);border-color:var(--accent);box-shadow:0 0 20px rgba(126,200,227,.25)}
.start-btn:active{transform:scale(.97)}
.start-btn.hidden{opacity:0;pointer-events:none;transform:scale(.9)}

/* 底部积累信息 */
.accumulation-bar{position:fixed;bottom:0;left:0;width:100%;z-index:10;
  padding:16px 32px 20px;
  background:linear-gradient(to top,rgba(10,14,39,.7),transparent);
  display:flex;justify-content:space-between;align-items:center}
.acc-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.acc-num{font-size:16px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums}
.acc-label{font-size:10px;color:var(--muted);letter-spacing:1px}

/* 历史条 */
.history-strip{display:flex;gap:3px;align-items:flex-end;height:24px;max-width:180px}
.history-bar{width:6px;border-radius:2px;background:linear-gradient(to top,rgba(126,200,227,.6),rgba(168,130,221,.4));
  min-height:2px;transition:height .3s ease}
.history-bar.today{background:linear-gradient(to top,var(--accent),var(--accent2));box-shadow:0 0 6px rgba(126,200,227,.5)}

/* 计时器 */
.timer-display{font-size:13px;font-variant-numeric:tabular-nums;color:var(--muted);letter-spacing:1px}

/* 完成提示 */
.complete-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,14,39,.85);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .5s ease}
.complete-overlay.show{opacity:1;pointer-events:auto}
.complete-card{text-align:center;transform:scale(.8);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.complete-overlay.show .complete-card{transform:scale(1)}
.complete-icon{font-size:48px;margin-bottom:16px}
.complete-title{font-size:24px;font-weight:600;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.complete-sub{font-size:14px;color:var(--muted);margin-bottom:24px}
.complete-btn{padding:12px 36px;border-radius:24px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e27;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:2px;transition:all .3s ease}
.complete-btn:hover{box-shadow:0 0 20px rgba(126,200,227,.4)}

/* 渐入动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .6s ease forwards}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-aurora"></div>
<canvas id="bg-canvas"></canvas>
<div class="stars" id="stars"></div>

<!-- 声音控制 -->
<div class="sound-controls">
  <button class="sound-btn" id="soundRain" title="雨声">🌧</button>
  <button class="sound-btn" id="soundOcean" title="海浪">🌊</button>
  <button class="sound-btn" id="soundWhite" title="白噪音">📻</button>
  <button class="sound-btn" id="soundVol" title="音量">🔊</button>
</div>
<div class="volume-wrap" id="volumeWrap">
  <label>音量</label>
  <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30">
</div>

<!-- 顶部状态 -->
<div class="topbar fade-in">
  <div class="stat-box">
    <div class="stat-num" id="todayCount">0</div>
    <div class="stat-label">今日呼吸</div>
  </div>
  <div class="divider"></div>
  <div class="stat-box">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-label">累计次数</div>
  </div>
  <div class="divider"></div>
  <div class="stat-box">
    <div class="stat-num" id="streakCount">0</div>
    <div class="stat-label">连续天数</div>
  </div>
</div>

<!-- 呼吸区 -->
<div class="breath-zone">
  <div class="breath-circle-wrap">
    <div class="breath-glow" id="breathGlow"></div>
    <div class="breath-ring ring-1" id="ring1"></div>
    <div class="breath-ring ring-2" id="ring2"></div>
    <div class="breath-ring ring-3" id="ring3"></div>
    <div class="breath-core" id="breathCore">
      <div class="phase-text" id="phaseText">准备</div>
    </div>
  </div>
</div>

<!-- 计数 + 计时 -->
<div class="counter-display fade-in">
  <div class="cycle-dots" id="cycleDots">
    <div class="cycle-dot"></div><div class="cycle-dot"></div><div class="cycle-dot"></div>
    <div class="cycle-dot"></div><div class="cycle-dot"></div><div class="cycle-dot"></div>
    <div class="cycle-dot"></div><div class="cycle-dot"></div><div class="cycle-dot"></div>
    <div class="cycle-dot"></div>
  </div>
  <div class="cycle-info">
    <span id="cycleInfo">10 次一组 · 点击开始</span>
    <span id="timerDisplay" style="display:none;margin-left:12px">⏱ 00:00</span>
  </div>
</div>

<!-- 开始按钮 -->
<button class="start-btn fade-in" id="startBtn">开始呼吸</button>

<!-- 底部积累 -->
<div class="accumulation-bar">
  <div class="acc-item">
    <div class="acc-num" id="sessionTime">00:00</div>
    <div class="acc-label">本次时长</div>
  </div>
  <div class="history-strip" id="historyStrip"></div>
  <div class="acc-item">
    <div class="acc-num" id="totalTime">0分钟</div>
    <div class="acc-label">累计冥想</div>
  </div>
</div>

<!-- 完成提示（已移除，自动连续） -->

<script>
// ========== 数据存储 ==========
const STORAGE_KEY = 'breath_meditation_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { days: {}, totalBreaths: 0, totalSeconds: 0, streak: 0, lastDate: null };
    return JSON.parse(raw);
  } catch(e) { return { days: {}, totalBreaths: 0, totalSeconds: 0, streak: 0, lastDate: null }; }
}

function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function todayStr() { return new Date().toISOString().slice(0,10); }

function getToday(data) {
  const t = todayStr();
  if (!data.days[t]) data.days[t] = { breaths: 0, seconds: 0, sessions: 0 };
  return data.days[t];
}

function calcStreak(data) {
  const dates = Object.keys(data.days).sort();
  if (dates.length === 0) return 0;
  let streak = 0;
  let check = new Date(todayStr());
  if (!data.days[todayStr()]) {
    check.setDate(check.getDate() - 1);
  }
  while (true) {
    const ds = check.toISOString().slice(0,10);
    if (data.days[ds] && data.days[ds].breaths > 0) {
      streak++;
      check.setDate(check.getDate() - 1);
    } else break;
  }
  return streak;
}

// ========== 白噪音引擎 (Web Audio API) ==========
let audioCtx = null;
let activeSound = null;   // 'rain' | 'ocean' | 'white' | null
let noiseNodes = [];      // 当前活跃的音频节点
let masterGain = null;
let currentVolume = 0.3;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = currentVolume;
  masterGain.connect(audioCtx.destination);
}

function stopAllSound() {
  noiseNodes.forEach(n => {
    try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e) {}
  });
  noiseNodes = [];
}

// 生成白噪音 buffer
function makeNoiseBuffer(type) {
  const sr = audioCtx.sampleRate;
  const len = sr * 3; // 3秒循环
  const buf = audioCtx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);

  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'rain') {
    // 雨声 = 白噪音 + 低频增强
    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99 * b0 + white * 0.05;
      b1 = 0.95 * b1 + white * 0.1;
      b2 = 0.7 * b2 + white * 0.3;
      data[i] = (b0 + b1 + b2 + white * 0.15) * 0.5;
    }
  } else if (type === 'ocean') {
    // 海浪 = 棕噪音 + LFO 调制
    let last = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      last = 0.98 * last + white * 0.02;
      // 加缓慢波动模拟浪涌
      const lfo = 0.5 + 0.5 * Math.sin(2 * Math.PI * 0.12 * i / sr);
      data[i] = last * lfo * 3;
    }
  }
  return buf;
}

function playSound(type) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  stopAllSound();

  const src = audioCtx.createBufferSource();
  src.buffer = makeNoiseBuffer(type);
  src.loop = true;

  // 滤波器塑造音色
  const filter = audioCtx.createBiquadFilter();
  if (type === 'rain') {
    filter.type = 'bandpass';
    filter.frequency.value = 1200;
    filter.Q.value = 0.5;
  } else if (type === 'ocean') {
    filter.type = 'lowpass';
    filter.frequency.value = 500;
    filter.Q.value = 0.3;
  } else {
    filter.type = 'lowpass';
    filter.frequency.value = 4000;
    filter.Q.value = 0.5;
  }

  // 海浪额外加 LFO 调制音量
  let lfoGain = null;
  if (type === 'ocean') {
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.12; // 约8秒一个浪
    lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.35;
    lfo.connect(lfoGain);
    // lfoGain 连接到一个额外的 gain 上做振幅调制
    const modGain = audioCtx.createGain();
    modGain.gain.value = 0.65;
    lfoGain.connect(modGain.gain);
    src.connect(filter);
    filter.connect(modGain);
    modGain.connect(masterGain);
    lfo.start();
    noiseNodes.push(lfo);
  } else {
    src.connect(filter);
    filter.connect(masterGain);
  }

  src.start();
  noiseNodes.push(src, filter);
  if (lfoGain) noiseNodes.push(lfoGain);

  // 淡入
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(currentVolume, audioCtx.currentTime + 1.5);

  activeSound = type;
}

function stopSound() {
  if (!audioCtx) return;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
  setTimeout(() => stopAllSound(), 900);
  activeSound = null;
}

// 声音按钮事件
const soundButtons = {
  rain: document.getElementById('soundRain'),
  ocean: document.getElementById('soundOcean'),
  white: document.getElementById('soundWhite'),
};

function toggleSound(type) {
  Object.entries(soundButtons).forEach(([t, btn]) => {
    if (t === type) {
      if (btn.classList.contains('active')) {
        btn.classList.remove('active');
        stopSound();
      } else {
        btn.classList.add('active');
        playSound(type);
      }
    } else {
      btn.classList.remove('active');
    }
  });
}

soundButtons.rain.addEventListener('click', () => toggleSound('rain'));
soundButtons.ocean.addEventListener('click', () => toggleSound('ocean'));
soundButtons.white.addEventListener('click', () => toggleSound('white'));

// 音量控制
const volBtn = document.getElementById('soundVol');
const volumeWrap = document.getElementById('volumeWrap');
const volumeSlider = document.getElementById('volumeSlider');

volBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  volumeWrap.classList.toggle('show');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.volume-wrap') && !e.target.closest('#soundVol')) {
    volumeWrap.classList.remove('show');
  }
});

volumeSlider.addEventListener('input', () => {
  currentVolume = volumeSlider.value / 100 * 0.6; // 最大 0.6 避免爆音
  if (masterGain && activeSound) {
    masterGain.gain.linearRampToValueAtTime(currentVolume, audioCtx.currentTime + 0.1);
  }
});

// ========== 星点背景 ==========
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 2 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.animationDelay = Math.random() * 4 + 's';
    s.style.animationDuration = (3 + Math.random() * 3) + 's';
    container.appendChild(s);
  }
}

// ========== Canvas 流动粒子 ==========
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initParticles() {
  particles = [];
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      r: Math.random() * 1.5 + 0.5,
      opacity: Math.random() * 0.15 + 0.05,
      hue: Math.random() > 0.5 ? 195 : 270
    });
  }
}
initParticles();

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 70%, 70%, ${p.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== 呼吸动画核心 ==========
const breathCore = document.getElementById('breathCore');
const breathGlow = document.getElementById('breathGlow');
const ring1 = document.getElementById('ring1');
const ring2 = document.getElementById('ring2');
const ring3 = document.getElementById('ring3');
const phaseText = document.getElementById('phaseText');
const startBtn = document.getElementById('startBtn');
const cycleDots = document.querySelectorAll('.cycle-dot');
const cycleInfo = document.getElementById('cycleInfo');
const timerDisplay = document.getElementById('timerDisplay');

const BREATHS_PER_SET = 10;

const PHASES = [
  { name: '吸', duration: 4000 },
  { name: '持', duration: 2000 },
  { name: '呼', duration: 6000 },
  { name: '持', duration: 1000 },
];

const MIN_SCALE = 0.5;
const MAX_SCALE = 1.0;

let isRunning = false;
let currentBreath = 0;
let currentPhaseIndex = 0;
let breathCount = 0;
let setCount = 0;
let sessionStartTime = 0;
let sessionSeconds = 0;
let timerInterval = null;
let animationFrame = null;
let phaseStartTime = 0;

function setBreathScale(scale) {
  const coreSize = 140 * scale;
  breathCore.style.width = coreSize + 'px';
  breathCore.style.height = coreSize + 'px';
  breathGlow.style.transform = `scale(${scale * 1.3})`;

  // 圆环跟随但幅度小一些
  const ringScale = 0.85 + (1.0 - 0.85) * ((scale - MIN_SCALE) / (MAX_SCALE - MIN_SCALE));
  ring1.style.transform = `scale(${ringScale})`;
  ring2.style.transform = `scale(${ringScale})`;
  ring3.style.transform = `scale(${ringScale})`;

  if (scale > 0.75) {
    breathCore.style.background = `linear-gradient(145deg,rgba(126,200,227,${0.35 * scale}),rgba(168,130,221,${0.25 * scale}))`;
    breathCore.style.boxShadow = `0 0 ${60 * scale}px rgba(126,200,227,${0.25 * scale}),inset 0 0 ${30 * scale}px rgba(168,130,221,${0.15 * scale})`;
  } else {
    breathCore.style.background = `linear-gradient(145deg,rgba(168,130,221,${0.3}),rgba(126,200,227,${0.2}))`;
    breathCore.style.boxShadow = `0 0 40px rgba(168,130,221,${0.2}),inset 0 0 20px rgba(126,200,227,${0.1})`;
  }
}

function animatePhase(timestamp) {
  if (!isRunning) return;
  if (!phaseStartTime) phaseStartTime = timestamp;

  const elapsed = timestamp - phaseStartTime;
  const phase = PHASES[currentPhaseIndex];
  const progress = Math.min(elapsed / phase.duration, 1);

  const eased = progress < 0.5
    ? 2 * progress * progress
    : 1 - Math.pow(-2 * progress + 2, 2) / 2;

  let scale;
  if (phase.name === '吸') {
    scale = MIN_SCALE + (MAX_SCALE - MIN_SCALE) * eased;
  } else if (phase.name === '呼') {
    scale = MAX_SCALE - (MAX_SCALE - MIN_SCALE) * eased;
  } else {
    // 持 — 保持上一阶段结束的状态
    scale = (currentPhaseIndex === 1) ? MAX_SCALE : MIN_SCALE;
  }

  setBreathScale(scale);

  if (progress >= 1) {
    nextPhase();
  } else {
    animationFrame = requestAnimationFrame(animatePhase);
  }
}

function nextPhase() {
  currentPhaseIndex++;
  phaseStartTime = 0;

  if (currentPhaseIndex >= PHASES.length) {
    currentPhaseIndex = 0;
    currentBreath++;
    breathCount++;

    const data = loadData();
    const today = getToday(data);
    today.breaths++;
    data.totalBreaths++;
    if (data.lastDate !== todayStr()) data.lastDate = todayStr();
    data.streak = calcStreak(data);
    saveData(data);
    updateDisplay();

    cycleDots.forEach((dot, i) => {
      dot.classList.remove('active');
      if (i < currentBreath) dot.classList.add('done');
      else dot.classList.remove('done');
    });

    if (currentBreath >= BREATHS_PER_SET) {
      // 一组完成，自动开始下一组
      setCount++;
      currentBreath = 0;
      const data = loadData();
      const today = getToday(data);
      today.sessions = (today.sessions || 0) + 1;
      saveData(data);

      // 重置进度点
      cycleDots.forEach(d => { d.classList.remove('active', 'done'); });
      cycleInfo.textContent = `第 ${setCount + 1} 组 · 继续呼吸`;
    }

    if (currentBreath < BREATHS_PER_SET) {
      cycleDots[currentBreath].classList.add('active');
    }
  }

  const phase = PHASES[currentPhaseIndex];
  phaseText.textContent = phase.name;
  animationFrame = requestAnimationFrame(animatePhase);
}

function startBreathing() {
  if (isRunning) return;
  isRunning = true;
  currentBreath = 0;
  currentPhaseIndex = 0;
  phaseStartTime = 0;
  setCount = 0;
  sessionStartTime = Date.now();

  startBtn.classList.add('hidden');
  cycleInfo.textContent = '第 1 组 · 专注呼吸';
  timerDisplay.style.display = 'inline';

  cycleDots.forEach(d => { d.classList.remove('active', 'done'); });
  cycleDots[0].classList.add('active');

  timerInterval = setInterval(() => {
    sessionSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
    document.getElementById('sessionTime').textContent = formatTime(sessionSeconds);
    timerDisplay.textContent = `⏱ ${formatTime(sessionSeconds)}`;

    const data = loadData();
    const today = getToday(data);
    today.seconds = (today.seconds || 0) + 1;
    data.totalSeconds = (data.totalSeconds || 0) + 1;
    saveData(data);
  }, 1000);

  const phase = PHASES[0];
  phaseText.textContent = phase.name;
  animationFrame = requestAnimationFrame(animatePhase);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

// ========== UI 更新 ==========
function updateDisplay() {
  const data = loadData();
  const today = getToday(data);

  document.getElementById('todayCount').textContent = today.breaths;
  document.getElementById('totalCount').textContent = data.totalBreaths;
  document.getElementById('streakCount').textContent = calcStreak(data);

  const totalMin = Math.floor((data.totalSeconds || 0) / 60);
  document.getElementById('totalTime').textContent = totalMin < 60
    ? totalMin + '分钟'
    : Math.floor(totalMin / 60) + '小时' + (totalMin % 60) + '分';

  updateHistoryStrip(data);
}

function updateHistoryStrip(data) {
  const strip = document.getElementById('historyStrip');
  strip.innerHTML = '';
  const today = todayStr();
  const dates = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0,10));
  }
  const maxBreaths = Math.max(1, ...dates.map(d => (data.days[d]?.breaths || 0)));
  dates.forEach(d => {
    const bar = document.createElement('div');
    bar.className = 'history-bar' + (d === today ? ' today' : '');
    const breaths = data.days[d]?.breaths || 0;
    bar.style.height = Math.max(2, (breaths / maxBreaths) * 24) + 'px';
    bar.title = d + ': ' + breaths + '次';
    strip.appendChild(bar);
  });
}

// ========== 事件 ==========
startBtn.addEventListener('click', startBreathing);
document.addEventListener('gesturestart', e => e.preventDefault());

// ========== 初始化 ==========
createStars();
updateDisplay();
setBreathScale(MIN_SCALE);

const data = loadData();
const today = getToday(data);
if (today.breaths === 0) {
  cycleInfo.textContent = '10 次一组 · 点击开始';
} else {
  cycleInfo.textContent = `今天已呼吸 ${today.breaths} 次 · 继续`;
}
</script>
